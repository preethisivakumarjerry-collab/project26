<!DOCTYPE html>
<html lang="en">
<head>
  <title> Dropdown </title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    body {
      background: linear-gradient(135deg, #1d2b64, #f8cdda);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container-box {
      width: 100%;
      max-width: 900px;
    }

    .card-ui {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: bold;
    }

    /* CUSTOM DROPDOWN ANIMATION */
    .dropdown-menu {
      opacity: 0;
      transform: scale(0.9) translateY(10px);
      transition: all 0.3s ease;
      display: block;
      visibility: hidden;
    }

    .dropdown-menu.show {
      opacity: 1;
      transform: scale(1) translateY(0);
      visibility: visible;
    }

    /* Hover effect */
    .dropdown-item {
      transition: 0.3s;
    }

    .dropdown-item:hover {
      background: #6c63ff;
      color: white;
      transform: translateX(5px);
    }

    .btn-custom {
      border-radius: 50px;
      padding: 10px 20px;
    }

    .section {
      margin-bottom: 25px;
    }

    /* Split button spacing */
    .btn-group {
      margin-top: 10px;
    }

  </style>
</head>

<body>

<div class="container-box">
  <div class="card-ui">

    <h2> Dropdown </h2>

    <!-- Basic -->
    <div class="section">
      <label>Basic Dropdown</label><br>
      <div class="dropdown">
        <button class="btn btn-primary btn-custom dropdown-toggle" data-bs-toggle="dropdown">
          Menu
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#"><i class="bi bi-house"></i> Home</a></li>
          <li><a class="dropdown-item" href="#"><i class="bi bi-person"></i> Profile</a></li>
          <li><a class="dropdown-item" href="#"><i class="bi bi-gear"></i> Settings</a></li>
        </ul>
      </div>
    </div>

    <!-- Split Button -->
    <div class="section">
      <label>Split Button</label><br>
      <div class="btn-group">
        <button class="btn btn-success btn-custom">Action</button>
        <button class="btn btn-success dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown"></button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#">Edit</a></li>
          <li><a class="dropdown-item" href="#">Delete</a></li>
        </ul>
      </div>
    </div>

    <!-- Drop Directions -->
    <div class="section">
      <label>Directions</label><br>

      <div class="btn-group dropup">
        <button class="btn btn-warning dropdown-toggle btn-custom" data-bs-toggle="dropdown">Up</button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#">Item</a></li>
        </ul>
      </div>

      <div class="btn-group dropend ms-2">
        <button class="btn btn-info dropdown-toggle btn-custom" data-bs-toggle="dropdown">Right</button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#">Item</a></li>
        </ul>
      </div>

      <div class="btn-group dropstart ms-2">
        <button class="btn btn-danger dropdown-toggle btn-custom" data-bs-toggle="dropdown">Left</button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#">Item</a></li>
        </ul>
      </div>

    </div>

    <!-- Form Dropdown -->
    <div class="section">
      <label>Login Dropdown</label><br>
      <div class="dropdown">
        <button class="btn btn-dark btn-custom dropdown-toggle" data-bs-toggle="dropdown">
          Login
        </button>
        <div class="dropdown-menu p-3">
          <form>
            <input type="email" class="form-control mb-2" placeholder="Email">
            <input type="password" class="form-control mb-2" placeholder="Password">
            <button class="btn btn-primary w-100">Login</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Dark -->
    <div class="section">
      <label>Dark Dropdown</label><br>
      <div class="dropdown">
        <button class="btn btn-light btn-custom dropdown-toggle" data-bs-toggle="dropdown">
          Dark Mode
        </button>
        <ul class="dropdown-menu dropdown-menu-dark">
          <li><a class="dropdown-item" href="#">Dashboard</a></li>
          <li><a class="dropdown-item" href="#">Logout</a></li>
        </ul>
      </div>
    </div>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
